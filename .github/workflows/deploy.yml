name: Deploy iTech B2B Marketplace to AWS

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deployment target'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - infrastructure
          - backend
          - frontend

env:
  AWS_REGION: ap-south-1
  TERRAFORM_VERSION: 1.5.0
  NODE_VERSION: '18'
  JAVA_VERSION: '17'

jobs:
  # Job 1: Infrastructure Deployment
  infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    if: github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'infrastructure' || github.event_name != 'workflow_dispatch'
    outputs:
      rds_endpoint: ${{ steps.terraform_output.outputs.rds_endpoint }}
      redis_endpoint: ${{ steps.terraform_output.outputs.redis_endpoint }}
      s3_bucket: ${{ steps.terraform_output.outputs.s3_bucket }}
      cloudfront_domain: ${{ steps.terraform_output.outputs.cloudfront_domain }}
      eb_environment_url: ${{ steps.terraform_output.outputs.eb_environment_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      
      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init
      
      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate
      
      - name: Terraform Plan
        working-directory: ./terraform
        run: |
          terraform plan \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="environment=${{ github.ref_name }}" \
            -var="domain_name=${{ secrets.DOMAIN_NAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -out=tfplan
      
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan
      
      - name: Get Terraform Outputs
        id: terraform_output
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ./terraform
        run: |
          echo "rds_endpoint=$(terraform output -raw rds_endpoint)" >> $GITHUB_OUTPUT
          echo "redis_endpoint=$(terraform output -raw redis_endpoint)" >> $GITHUB_OUTPUT
          echo "s3_bucket=$(terraform output -raw s3_bucket)" >> $GITHUB_OUTPUT
          echo "cloudfront_domain=$(terraform output -raw cloudfront_domain)" >> $GITHUB_OUTPUT
          echo "eb_environment_url=$(terraform output -raw eb_environment_url)" >> $GITHUB_OUTPUT

  # Job 2: Backend Build and Deploy
  backend:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest
    needs: infrastructure
    if: github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'backend' || github.event_name != 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      
      - name: Build with Maven
        working-directory: ./backend
        run: ./mvnw clean package -DskipTests
      
      - name: Run tests
        working-directory: ./backend
        run: ./mvnw test
      
      - name: Generate test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Tests
          path: backend/target/surefire-reports/*.xml
          reporter: java-junit
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Prepare deployment package
        working-directory: ./backend
        run: |
          mkdir -p build
          cp target/itech_backend-*.jar build/application.jar
          if [ -d ".ebextensions" ]; then
            cp -r .ebextensions build/
          fi
      
      - name: Create deployment ZIP
        working-directory: ./backend/build
        run: |
          timestamp=$(date +%Y%m%d-%H%M%S)
          zip -r ../itech-backend-${timestamp}.zip . -x "*.git*"
          echo "BACKEND_ZIP=itech-backend-${timestamp}.zip" >> $GITHUB_ENV
      
      - name: Deploy to Elastic Beanstalk
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ./backend
        run: |
          # Upload to S3
          aws s3 cp ${BACKEND_ZIP} s3://itech-deployment-artifacts/backend/
          
          # Create application version
          timestamp=$(date +%Y%m%d-%H%M%S)
          aws elasticbeanstalk create-application-version \
            --application-name itech-backend \
            --version-label v${timestamp} \
            --source-bundle S3Bucket=itech-deployment-artifacts,S3Key=backend/${BACKEND_ZIP}
          
          # Deploy to environment
          aws elasticbeanstalk update-environment \
            --environment-name itech-backend-prod \
            --version-label v${timestamp}

  # Job 3: Frontend Build and Deploy
  frontend:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    needs: [infrastructure, backend]
    if: github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'frontend' || github.event_name != 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Run linting
        working-directory: ./frontend
        run: npm run lint
      
      - name: Run tests
        working-directory: ./frontend
        run: npm run test:ci
      
      - name: Build application
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ needs.backend.outputs.eb_environment_url || secrets.API_BASE_URL }}
          NEXT_PUBLIC_S3_BUCKET: ${{ needs.infrastructure.outputs.s3_bucket }}
          NEXT_PUBLIC_CLOUDFRONT_DOMAIN: ${{ needs.infrastructure.outputs.cloudfront_domain }}
        run: npm run build:production
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Deploy to AWS Amplify
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ./frontend
        run: |
          # Install Amplify CLI
          npm install -g @aws-amplify/cli
          
          # Configure Amplify
          export AWS_PROFILE=default
          
          # Deploy to Amplify
          amplify publish --yes || echo "Manual Amplify deployment required"

  # Job 4: Security Scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Job 5: Database Migration
  migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: [infrastructure, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Wait for backend deployment
        run: |
          echo "Waiting for backend to be deployed..."
          sleep 120  # Wait for backend to start
      
      - name: Run database migrations
        working-directory: ./backend
        env:
          RDS_HOSTNAME: ${{ needs.infrastructure.outputs.rds_endpoint }}
          RDS_USERNAME: ${{ secrets.DB_USERNAME }}
          RDS_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "Database migrations will run automatically via Flyway when backend starts"
          echo "Checking backend health..."
          
          # Health check
          max_attempts=30
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if curl -f -s "${{ needs.backend.outputs.eb_environment_url }}/actuator/health" > /dev/null; then
              echo "Backend is healthy!"
              break
            fi
            echo "Attempt $attempt/$max_attempts: Backend not ready yet..."
            sleep 10
            attempt=$((attempt + 1))
          done

  # Job 6: Smoke Tests
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [infrastructure, backend, frontend, migrate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Run smoke tests
        env:
          API_BASE_URL: ${{ needs.backend.outputs.eb_environment_url }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        run: |
          # Basic API health check
          echo "Testing API health..."
          curl -f "${API_BASE_URL}/actuator/health" || exit 1
          
          # Test database connectivity
          echo "Testing database connectivity..."
          curl -f "${API_BASE_URL}/api/health/db" || exit 1
          
          # Test Redis connectivity
          echo "Testing Redis connectivity..."
          curl -f "${API_BASE_URL}/api/health/redis" || exit 1
          
          echo "All smoke tests passed!"

  # Job 7: Notification
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [infrastructure, backend, frontend, migrate, smoke-tests]
    if: always()
    
    steps:
      - name: Notify Success
        if: needs.smoke-tests.result == 'success'
        run: |
          echo "🎉 Deployment successful!"
          # Add Slack/Discord/Email notification here
      
      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          # Add failure notification here
