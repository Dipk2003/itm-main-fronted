name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linting
      run: npm run lint

    - name: Run type checking
      run: npm run typecheck

    - name: Run tests
      run: npm run test:ci
      env:
        CI: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: npm audit


  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Checkout code for deployment
      uses: actions/checkout@v3
      
    - name: Setup Node.js for deployment
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
        
    - name: Deploy to AWS Amplify
      run: |
        echo "Deploying to AWS Amplify..."
        
        # Create a deployment ZIP file
        echo "Creating deployment package..."
        cd .next && zip -r ../deployment.zip . && cd ..
        
        # Upload to temporary S3 location (using date for uniqueness)
        TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        S3_KEY="deployments/frontend-${TIMESTAMP}.zip"
        
        # Create S3 bucket if it doesn't exist (for deployment artifacts)
        aws s3api create-bucket --bucket itech-amplify-deployments --region ap-south-1 --create-bucket-configuration LocationConstraint=ap-south-1 || true
        
        # Upload deployment package
        aws s3 cp deployment.zip s3://itech-amplify-deployments/${S3_KEY}
        
        # Check for running jobs and stop them if needed
        echo "Checking for running deployments..."
        RUNNING_JOBS=$(aws amplify list-jobs --app-id dxuvwwiluma2p --branch-name main --max-items 1 --query 'jobSummaries[?status==`RUNNING`].jobId' --output text)
        
        if [ ! -z "$RUNNING_JOBS" ] && [ "$RUNNING_JOBS" != "None" ]; then
          echo "Found running deployment: $RUNNING_JOBS"
          echo "Stopping previous deployment..."
          aws amplify stop-job --app-id dxuvwwiluma2p --branch-name main --job-id "$RUNNING_JOBS" || true
          echo "Waiting for job to stop..."
          sleep 10
        fi
        
        # Create and start deployment
        echo "Creating Amplify deployment..."
        DEPLOYMENT_RESPONSE=$(aws amplify create-deployment --app-id dxuvwwiluma2p --branch-name main)
        DEPLOYMENT_ID=$(echo $DEPLOYMENT_RESPONSE | jq -r '.deploymentId')
        
        if [ "$DEPLOYMENT_ID" = "null" ] || [ -z "$DEPLOYMENT_ID" ]; then
          echo "Error: Failed to create deployment"
          echo "Response: $DEPLOYMENT_RESPONSE"
          exit 1
        fi
        
        echo "Created deployment: ${DEPLOYMENT_ID}"
        
        # Start the deployment
        echo "Starting deployment..."
        aws amplify start-deployment --app-id dxuvwwiluma2p --branch-name main --deployment-id "${DEPLOYMENT_ID}" --source-url "s3://itech-amplify-deployments/${S3_KEY}"
        echo "Deployment started successfully: ${DEPLOYMENT_ID}"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
    - name: Send Slack notification
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        fields: repo,message,commit,author,action,eventName,ref,workflow,took
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
