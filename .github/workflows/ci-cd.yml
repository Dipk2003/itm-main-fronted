name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linting
      run: npm run lint

    - name: Run type checking
      run: npm run typecheck

    - name: Run tests
      run: npm run test:ci
      env:
        CI: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: npm audit


  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Checkout code for deployment
      uses: actions/checkout@v3
      
    - name: Setup Node.js for deployment
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
        
    - name: Deploy to AWS Amplify
      run: |
        echo "Deploying to AWS Amplify..."
        
        # Create a deployment ZIP file
        echo "Creating deployment package..."
        cd .next && zip -r ../deployment.zip . && cd ..
        
        # Prepare deployment ZIP file (already created above)
        echo "Deployment package ready: deployment.zip"
        
        # Check for running or pending jobs and stop them if needed
        echo "Checking for active deployments..."
        ACTIVE_JOBS=$(aws amplify list-jobs --app-id dxuvwwiluma2p --branch-name main --max-items 5 --query 'jobSummaries[?status==`RUNNING` || status==`PENDING`].jobId' --output text)
        
        if [ ! -z "$ACTIVE_JOBS" ] && [ "$ACTIVE_JOBS" != "None" ]; then
          echo "Found active deployments: $ACTIVE_JOBS"
          for JOB_ID in $ACTIVE_JOBS; do
            echo "Stopping deployment: $JOB_ID"
            aws amplify stop-job --app-id dxuvwwiluma2p --branch-name main --job-id "$JOB_ID" || true
          done
          echo "Waiting for jobs to stop..."
          sleep 15
        fi
        
        # Create deployment and get upload URL
        echo "Creating Amplify deployment..."
        DEPLOYMENT_RESPONSE=$(aws amplify create-deployment --app-id dxuvwwiluma2p --branch-name main)
        DEPLOYMENT_ID=$(echo $DEPLOYMENT_RESPONSE | jq -r '.jobId')
        UPLOAD_URL=$(echo $DEPLOYMENT_RESPONSE | jq -r '.zipUploadUrl')
        
        if [ "$DEPLOYMENT_ID" = "null" ] || [ -z "$DEPLOYMENT_ID" ]; then
          echo "Error: Failed to create deployment"
          echo "Response: $DEPLOYMENT_RESPONSE"
          exit 1
        fi
        
        echo "Created deployment: ${DEPLOYMENT_ID}"
        echo "Upload URL received"
        
        # Upload ZIP file to Amplify's provided URL
        echo "Uploading deployment package to Amplify..."
        curl -X PUT "$UPLOAD_URL" --data-binary @deployment.zip -H "Content-Type: application/zip"
        
        # Start the deployment
        echo "Starting deployment..."
        aws amplify start-deployment --app-id dxuvwwiluma2p --branch-name main --job-id "${DEPLOYMENT_ID}"
        echo "Deployment started successfully: ${DEPLOYMENT_ID}"
