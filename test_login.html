<!DOCTYPE html>
<html>
<head>
    <title>Login Test</title>
</head>
<body>
    <h1>Vendor Login Test</h1>
    <button onclick="clearStorage()">Clear All Storage</button>
    <button onclick="testLogin()">Test Vendor Login</button>
    <div id="result"></div>

    <script>
        function clearStorage() {
            localStorage.clear();
            sessionStorage.clear();
            document.getElementById('result').innerHTML = '<p style="color: green;">All storage cleared</p>';
        }

        async function testLogin() {
            // Clear any existing tokens first
            localStorage.clear();
            
            try {
                const response = await fetch('http://localhost:8080/api/auth/vendor/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        emailOrPhone: 'mishra@gmail.com',
                        password: 'password123'
                    })
                });

                const data = await response.text();
                document.getElementById('result').innerHTML = `
                    <h3>Response Status: ${response.status}</h3>
                    <h3>Response:</h3>
                    <pre>${data}</pre>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h3>Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }
    </script>
</body>
</html>
