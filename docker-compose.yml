version: '3.8'

services:
  # Frontend Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: itm-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8080
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend
    networks:
      - itm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend Application (placeholder - replace with your backend)
  backend:
    image: your-backend-image:latest  # Replace with your actual backend image
    container_name: itm-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=production
      - DATABASE_URL=jdbc:postgresql://database:5432/itm_db
      - DATABASE_USERNAME=itm_user
      - DATABASE_PASSWORD=itm_password
    depends_on:
      - database
      - redis
    networks:
      - itm-network
    restart: unless-stopped

  # Database
  database:
    image: postgres:15-alpine
    container_name: itm-database
    environment:
      - POSTGRES_DB=itm_db
      - POSTGRES_USER=itm_user
      - POSTGRES_PASSWORD=itm_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - itm-network
    restart: unless-stopped

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: itm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - itm-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: itm-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - itm-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  itm-network:
    driver: bridge